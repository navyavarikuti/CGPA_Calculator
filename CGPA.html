<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGPA Calculator</title>
</head>
<link rel="stylesheet" href="CGPA.css"/>
<body>
   <form>
    <input type="number" id="semesterCount" placeholder="Enter number of semesters" min="1" max="8">

    <button type="button" onclick="createFields()">Enter</button>

    <div id="sgpaFields"></div>


    <button type="button" id="calculateBtn"  onclick="calculateCGPA()" style="display:none;">
        Calculate CGPA</button>

    <h2 id="result"></h2>
</form>
<script src="CGPA.js"></script>
</body>
</html>
